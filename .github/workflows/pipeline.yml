name: CI pipeline

# No workflow-level permissions; each job requests only what it needs below.
permissions: {}

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "main"
    tags:
      - "*"

jobs:
    setup:
      permissions:
        contents: read
      uses: ./.github/workflows/setup.yml
      with:
        package_name: 'vdoc'
        project: 'bypass'
        scope: 'public'
        maturity: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') && 'production' || 'testing' }}
        location: 'cloud'
        registry: 'voraus.jfrog.io'

    build:
      needs:
        - setup
      permissions:
        contents: read
        id-token: write # JFrog CLI OIDC auth (setup-jfrog)
      uses: ./.github/workflows/build.yml
      secrets: inherit
      with:
        vpu_docker_registry: ${{ needs.setup.outputs.vpu_docker_registry }}
        vpu_docker_image_name: ${{ needs.setup.outputs.vpu_docker_image_name }}
        vpu_docker_repositories: ${{ needs.setup.outputs.vpu_docker_repositories }}
        build_name: ${{ needs.setup.outputs.build_name }}
        build_number: ${{ needs.setup.outputs.build_number }}

    tests-and-coverage:
      permissions:
        contents: read
      uses: ./.github/workflows/tests_and_coverage.yml
      needs:
        - build
      secrets: inherit

    lint:
      permissions:
        contents: read
      uses: ./.github/workflows/lint.yml
      needs:
        - setup
      secrets: inherit

    # Keep PyPI Trusted Publishing in the top-level workflow because
    # reusable workflows are not officially supported by PyPI Trusted Publishing.
    publish-pypi:
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
      needs:
      - build
      - tests-and-coverage
      - lint
      runs-on: ubuntu-latest
      permissions:
        contents: read
        id-token: write # PyPI Trusted Publishing
      steps:
        - name: Download all artifacts
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
          with:
            name: dist
            path: dist

        - name: Publish package distributions to PyPI
          uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
          env:
            url: https://pypi.org/p/vdoc

    publish:
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
      needs:
      - setup
      - build
      - tests-and-coverage
      - lint
      permissions:
        contents: write # JReleaser creates the GitHub release/tag
        id-token: write # JFrog CLI OIDC auth (setup-jfrog)
        pages: write # GitHub Pages docs deployment
      uses: ./.github/workflows/publish.yml
      secrets: inherit
      with:
        vpu_docker_registry: ${{ needs.setup.outputs.vpu_docker_registry }}
        vpu_docker_image_name: ${{ needs.setup.outputs.vpu_docker_image_name }}
        vpu_docker_repositories: ${{ needs.setup.outputs.vpu_docker_repositories }}
        pypi_deploy_repo: ${{ needs.setup.outputs.pypi_deploy_repo }}
        build_name: ${{ needs.setup.outputs.build_name }}
        build_number: ${{ needs.setup.outputs.build_number }}

    deploy:
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
      needs:
        - publish
        - publish-pypi
      runs-on: ubuntu-latest
      permissions:
        contents: read
      environment:
        name: production
        url: https://docs.vorausrobotik.com
      steps:
        - name: Trigger Dokploy deployment
          run: curl --fail --silent --show-error --max-time 30 "$DOKPLOY_WEBHOOK_URL"
          env:
            DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}

        - name: Verify deployed version
          run: |
            for attempt in $(seq 1 12); do
              sleep 5
              # /api/version/ returns the version as a JSON string, e.g. "0.24.0"
              deployed="$(curl -fsSL --max-time 10 http://docs.vorausrobotik.com/api/version/ | tr -d '"')" || deployed="<unreachable>"
              echo "Attempt ${attempt}/12: Deployed version is '${deployed}', expecting '${EXPECTED_VERSION}'"
              if [ "$deployed" = "$EXPECTED_VERSION" ]; then
                exit 0
              fi
            done
            echo "::error::Deployment did not serve version '${EXPECTED_VERSION}' within 60 seconds"
            exit 1
          env:
            EXPECTED_VERSION: ${{ github.ref_name }}
