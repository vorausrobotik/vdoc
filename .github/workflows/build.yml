name: Build

on:
  workflow_call:
    inputs:
      vpu_docker_registry:
        required: true
        type: string
      vpu_docker_image_name:
        required: true
        type: string
      vpu_docker_repositories:
        required: true
        type: string
      build_name:
        required: true
        type: string
      build_number:
        required: true
        type: string

jobs:
  build-python:
    runs-on: ubuntu-latest
    env:
      COLUMNS: 160
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: lts/*

      - name: Sync project
        run: uv sync --frozen

      - name: Install npm dependencies
        run: npm ci

      - name: Build docs
        run: uv run tox run -e docs

      - name: Build UI
        run: npm run build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build python app
        run: uv run tox run -e build

      - name: Upload rollup visualizer result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rollup-visualizer
          path: reports/bundle-report.html

      - name: Upload python artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/*

      - name: Upload docs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs
          path: docs/build/html/*

  build-docker:
    needs:
      - build-python
    runs-on: ubuntu-latest
    env:
      VPU_DOCKER_REGISTRY: ${{ inputs.vpu_docker_registry }}
      VPU_DOCKER_IMAGE_NAME: ${{ inputs.vpu_docker_image_name }}
      VPU_DOCKER_REPOSITORIES: ${{ inputs.vpu_docker_repositories }}
      COLUMNS: 160
      JFROG_CLI_BUILD_NAME: ${{ inputs.build_name }}
      JFROG_CLI_BUILD_NUMBER: ${{ inputs.build_number }}
      JFROG_CLI_TEMP_DIR: ${{ github.workspace }}/.jfrog-build"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-jfrog

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install VPU
        run: uv tool install voraus-pipeline-utils

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Download python artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist

      - name: Build Docker Image(s)
        run: vpu docker build -f Dockerfile.prod

      - name: Save Docker Image(s)
        run: vpu docker save --output docker-images.tar

      - name: Upload docker images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-images
          path: docker-images.tar

