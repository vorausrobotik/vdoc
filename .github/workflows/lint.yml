name: Linting

on: [workflow_call]

jobs:
  lint-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Run static checks
        run: uv run tox run -e lint
  lint-ts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-node@v6
      with:
        node-version: lts/*

    - name: Install Dependencies
      run: npm ci

    - name: Lint UI
      run: npm run lint
