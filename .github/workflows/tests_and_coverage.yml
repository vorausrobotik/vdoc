name: Tests & Coverage

on: [workflow_call]


jobs:
  test-python:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: astral-sh/setup-uv@v7

    - name: Run tests
      run: uv run tox -f test

    - name: Upload combined python coverage
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v7
      with:
        name: python-coverage-report
        path: reports/coverage-python.xml

  test-ui-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm ci

      - name: Run UI unit tests
        run: npm run test:unit

      - name: Upload vitest coverage report
        uses: actions/upload-artifact@v6
        with:
          name: vitest-coverage-report
          path: reports/coverage-vitest.xml

  test-ui-e2e:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          VDOC_PLUGINS_ORAMA_ENDPOINT: "${{ secrets.ORAMA_API_ENDPOINT }}"
          VDOC_PLUGINS_ORAMA_API_KEY: "${{ secrets.ORAMA_API_KEY }}"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
  upload-coverage:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    needs:
      - test-ui-unit
      - test-python
    steps:
      - uses: actions/checkout@v6

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v6
        with:
          merge-multiple: true
          path: reports

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: vorausrobotik/vdoc
          disable_search: true
          disable_telem: true
          files: 'reports/coverage-python.xml,reports/coverage-vitest.xml'
          fail_ci_if_error: true
          verbose: true
