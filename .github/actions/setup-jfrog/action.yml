name: Setup JFrog CLI
description: Configure JFrog CLI with OIDC authentication

runs:
  using: composite
  steps:
    - uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
      env:
        JF_URL: https://voraus.jfrog.io
      with:
        oidc-provider-name: voraus-github-organization
        disable-auto-build-publish: "true"
